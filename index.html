<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до системи ПММ V3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        body { 
            background: var(--bg-gradient); 
            color: var(--text-main);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card-auth { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border); 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 40px !important;
        }

        h4 {
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .form-select, .form-control {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-main) !important;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }

        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
        }

        .form-select:focus, .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15) !important;
            outline: none;
        }

        .form-select:disabled {
            opacity: 0.4;
            background-color: rgba(15, 23, 42, 0.3) !important;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .btn-primary:disabled {
            background: #334155;
            color: #64748b;
            opacity: 1;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 10px;
            font-size: 0.9rem;
            padding: 12px;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            border-width: 0.15em;
            color: #0f172a !important;
        }
    </style>
</head>
<body>

<div class="card card-auth">
    <div class="text-center mb-4">
        <h4>Система обліку ПММ V3</h4>
        <p class="text-muted small" id="statusText">Завантаження...</p>
    </div>

    <form id="authForm">
        <div class="mb-4">
            <label for="categorySelect" class="form-label">Категорія</label>
            <select class="form-select" id="categorySelect" required disabled>
                <option value="" selected disabled>Очікування завантаження даних...</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="subUnitSelect" class="form-label">Підрозділ</label>
            <select class="form-select" id="subUnitSelect" required disabled>
                <option value="" selected disabled>-- Спочатку оберіть батальйон --</option>
            </select>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <label for="monthSelect" class="form-label">Звітний місяць</label>
                <select class="form-select" id="monthSelect" required>
                    <option value="" selected disabled>-- Місяць --</option>
                    <option value="01">Січень (01)</option>
                    <option value="02">Лютий (02)</option>
                    <option value="03">Березень (03)</option>
                    <option value="04">Квітень (04)</option>
                    <option value="05">Травень (05)</option>
                    <option value="06">Червень (06)</option>
                    <option value="07">Липень (07)</option>
                    <option value="08">Серпень (08)</option>
                    <option value="09">Вересень (09)</option>
                    <option value="10">Жовтень (10)</option>
                    <option value="11">Листопад (11)</option>
                    <option value="12">Грудень (12)</option>
                </select>
            </div>
            <div class="col-6">
                <label for="yearSelect" class="form-label">Рік</label>
                <select class="form-select" id="yearSelect" required>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                </select>
            </div>
        </div>

        <div class="mb-4">
            <label for="gatewayPassword" class="form-label">Пароль доступу</label>
            <input type="password" class="form-control" id="gatewayPassword" required placeholder="Введіть пароль підрозділу...">
        </div>

        <div id="errorDiv" class="alert alert-danger d-none mb-4" role="alert"></div>

        <button type="submit" id="submitBtn" class="btn btn-primary w-100" disabled>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
            <span id="btnText">Вхід до системи</span>
        </button>
    </form>
</div>

<script>
    const N8N_URL_GET_STRUCTURE = 'https://sokoliksokolik.app.n8n.cloud/webhook/get-branches-list';
    const N8N_URL_CHECK_GATEWAY  = 'https://sokoliksokolik.app.n8n.cloud/webhook/check-database-gateway';

    const categorySelect = document.getElementById('categorySelect');
    const subUnitSelect  = document.getElementById('subUnitSelect');
    const yearSelect     = document.getElementById('yearSelect');
    const monthSelect    = document.getElementById('monthSelect');
    const gatewayPassword = document.getElementById('gatewayPassword');
    const statusText     = document.getElementById('statusText');
    const errorDiv       = document.getElementById('errorDiv');
    const submitBtn      = document.getElementById('submitBtn');
    const btnText        = document.getElementById('btnText');
    const btnSpinner     = document.getElementById('btnSpinner');

    let currentStructure = [];

    function getDeviceAndBrowser() {
        const ua = navigator.userAgent;
        let device = "Невідомий пристрій";
        let browser = "Невідомий браузер";

        if (/windows/i.test(ua)) device = "PC (Windows)";
        else if (/macintosh|mac os x/i.test(ua) && !/mobile/i.test(ua)) device = "PC (Mac)";
        else if (/iphone|ipad|ipod/i.test(ua)) device = "iPhone / iPad (iOS)";
        else if (/android/i.test(ua)) device = "Смартфон (Android)";
        else if (/linux/i.test(ua)) device = "PC (Linux)";

        if (/opera|opr/i.test(ua)) browser = "Opera";
        else if (/edg/i.test(ua)) browser = "Edge";
        else if (/chrome|chromium|crios/i.test(ua)) browser = "Chrome";
        else if (/safari/i.test(ua)) browser = "Safari";
        else if (/firefox|fxios/i.test(ua)) browser = "Firefox";

        return { device, browser };
    }

    fetch(N8N_URL_GET_STRUCTURE)
        .then(res => { if (!res.ok) throw new Error(); return res.text(); })
        .then(text => {
            let cleanText = text.trim();
            if (cleanText.startsWith('==')) { cleanText = cleanText.substring(2); }
            return JSON.parse(cleanText);
        })
        .then(data => {
            let responseData = Array.isArray(data) ? data[0] : data;
            if (responseData.json) responseData = responseData.json;

            if (responseData && responseData.structure) {
                currentStructure = responseData.structure;
                updateCategories(currentStructure);
                statusText.innerText = 'Авторизація оператора підрозділу';
                submitBtn.disabled = false;
            } else {
                throw new Error();
            }
        })
        .catch(err => {
            console.error(err);
            statusText.innerText = "🔴 Помилка відповіді структури n8n";
            categorySelect.innerHTML = '<option value="">Не вдалося розпарсити структуру</option>';
        });

    function updateCategories(structure) {
        structure.sort((a, b) => {
            function getCategoryWeight(name) {
                const uName = (name || '').toUpperCase();
                if (uName.includes("А7051") || uName.includes("A7051")) return 4;
                if (uName.includes("УПРАВЛІННЯ")) return 1;
                if (uName.includes("ТЕРИТОРІАЛЬНОЇ")) return 2;
                if (uName.includes("БЕЗПІЛОТНИХ")) return 3;
                return 5;
            }
            const weightA = getCategoryWeight(a.name);
            const weightB = getCategoryWeight(b.name);
            if (weightA !== weightB) return weightA - weightB;
            return (a.name || '').localeCompare(b.name || '', 'uk');
        });

        categorySelect.innerHTML = '<option value="" selected disabled>-- Оберіть батальйон --</option>';
        structure.forEach(bat => {
            const option = document.createElement('option');
            option.value = bat.code;  
            option.textContent = bat.name;
            categorySelect.appendChild(option);
        });
        categorySelect.disabled = false;
    }

    categorySelect.addEventListener('change', function() {
        const selectedBatCode = this.value;
        errorDiv.classList.add('d-none');
        
        const selectedBat = currentStructure.find(b => b.code === selectedBatCode);
        
        if (selectedBatCode === 'А7051' || selectedBatCode === 'A7051' || (selectedBat && (selectedBat.name || '').toUpperCase().includes('А7051'))) {
            subUnitSelect.innerHTML = '';
            const option = document.createElement('option');
            option.value = 'ALL';
            option.textContent = 'Всі підрозділи';
            option.selected = true;
            subUnitSelect.appendChild(option);
            subUnitSelect.disabled = true;
        } else if (selectedBat && selectedBat.sub_units) {
            subUnitSelect.innerHTML = '<option value="" selected disabled>-- Оберіть підрозділ --</option>';
            
            const allOption = document.createElement('option');
            allOption.value = 'ALL';
            allOption.textContent = 'Всі підрозділи';
            subUnitSelect.appendChild(allOption);

            const sortedUnits = [...selectedBat.sub_units].sort((a, b) => {
                const nameA = (typeof a === 'object') ? (a.name || '') : a;
                const nameB = (typeof b === 'object') ? (b.name || '') : b;
                return nameA.localeCompare(nameB, 'uk');
            });

            sortedUnits.forEach(unit => {
                if (unit) {
                    const option = document.createElement('option');
                    option.value = (typeof unit === 'object') ? unit.code : unit; 
                    option.textContent = (typeof unit === 'object') ? unit.name : unit;
                    subUnitSelect.appendChild(option);
                }
            });
            subUnitSelect.disabled = false;
        } else {
            subUnitSelect.innerHTML = '<option value="" selected disabled>-- Немає доступних підрозділів --</option>';
            subUnitSelect.disabled = true;
        }
    });

    function showError(message) {
        errorDiv.innerText = message;
        errorDiv.classList.remove('d-none');
        submitBtn.disabled = false;
        btnText.innerText = 'Вхід до системи';
        btnSpinner.classList.add('d-none');
    }

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const category = categorySelect.value;
        const subUnit  = subUnitSelect.value;
        const year     = yearSelect.value;   
        const month    = monthSelect.value;
        const pass     = gatewayPassword.value.trim();
        
        errorDiv.classList.add('d-none');
        submitBtn.disabled = true;
        btnText.innerText = 'Перевірка...';
        btnSpinner.classList.remove('d-none');

        const info = getDeviceAndBrowser();

        fetch(N8N_URL_CHECK_GATEWAY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ category: category, sub_unit: subUnit, month: month, year: year })
        })
        .then(res => { if (!res.ok) throw new Error(); return res.json(); })
        .then(data => {
            let responseData = Array.isArray(data) ? data[0] : data;
            if (responseData.json) responseData = responseData.json;

            if (responseData && responseData.exists === true) {
                const correctPassword = String(responseData.Pasword || responseData.Password || responseData.password || '').trim();

                if (pass === correctPassword) {
                    btnText.innerText = 'Вхід...';
                    
                    const tableId = responseData.table_id || '';
                    
                    // ФОНОВА НЕБЛОКУЮЧА ВІДПРАВКА ЛОГУ ТА НЕГАЙНИЙ ПЕРЕХІД ПАРАЛЕЛЬНО
                    fetch('https://sokoliksokolik.app.n8n.cloud/webhook/log-system-enter', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            category: category, 
                            sub_unit: subUnit, 
                            month: month, 
                            year: year, 
                            status: "Успішно",
                            device: info.device,
                            browser: info.browser
                        })
                    }).catch(err => console.error(err));

                    // Моментально відкриваємо форму обліку
                    window.location.href = `index_PMM_V3.html?category=${encodeURIComponent(category)}&sub_unit=${encodeURIComponent(subUnit)}&month=${month}&year=${year}&table_id=${encodeURIComponent(tableId)}`;
                } else {
                    fetch('https://sokoliksokolik.app.n8n.cloud/webhook/log-system-enter', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            category: category, 
                            sub_unit: subUnit, 
                            month: month, 
                            year: year, 
                            status: "Невірний пароль",
                            device: info.device,
                            browser: info.browser
                        })
                    }).catch(err => console.error(err));

                    showError('❌ Невірний пароль доступу для цього підрозділу/режиму!');
                }
            } else {
                showError(`⚠️ Звітний період ${month}_${year} або конфігурацію підрозділу не знайдено в Реєстрі!`);
            }
        })
        .catch(err => {
            console.error(err);
            showError('❌ Брама n8n не відповідає або повернула некоректну відповідь.');
        });
    });
</script>
</body>
</html>
